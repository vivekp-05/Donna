name = "donna-api"
main = "src/worker.ts"

# nodejs_compat: the app is written against Node-ish globals and, more
# importantly, config.ts reads process.env at module scope. That works because
# nodejs_compat_populate_process_env is on by default for compatibility dates
# from 2025-04-01 — which is what let ENV and its ten readers survive the port
# without threading `env` through every function.
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

# NOTE: every bare key must sit above the first [table] header. TOML assigns
# them to whatever table is open, so putting [[routes]] up here silently ate
# compatibility_date and compatibility_flags.

# api.vivek-patel.com ONLY — the apex is the portfolio site served by Vercel
# (76.76.21.21) and must not be touched. custom_domain provisions the DNS record
# and certificate for this hostname alone. It also sidesteps workers.dev, which
# this account has never onboarded.
[[routes]]
pattern = "api.vivek-patel.com"
custom_domain = true

# The whole reason a rented box is no longer needed: dispatch state lives here,
# not in a process's RAM, so any invocation can carry any call forward.
[[d1_databases]]
binding = "DB"
database_name = "donna"
database_id = "dffda60d-c15e-4d68-8f66-30d145735084"

# The report that never came. Timers do not survive a serverless invocation, so
# this replaces the per-call setTimeout that used to live in vapi.ts: without it
# a single dropped webhook strands a donation at `dispatching` forever.
[triggers]
crons = ["* * * * *"]

[vars]
# Non-secret config. Secrets (VAPI_API_KEY, VAPI_PHONE_NUMBER_ID, GEMINI_API_KEY,
# VAPI_WEBHOOK_SECRET) are set with `wrangler secret put` and land on process.env
# alongside these.
LLM_PROVIDER = "gemini"
GEMINI_MODEL = "gemini-2.5-flash"
DB_PROVIDER = "d1"
VOICE_PROVIDER = "vapi"
FOOD_BANK_NAME = "San Marin Food Bank"
# The Worker's own origin. VAPI posts call reports here; unset means no call can
# ever resolve — it would sit until the cron sweep writes it off as no_answer.
PUBLIC_WEBHOOK_URL = "https://api.vivek-patel.com"
# Redirects every outbound call to one handset. MUST stay set for demos: the
# seeded pantry numbers are fake but NOT guaranteed unrouted.
LIVE_CALL_PHONE_OVERRIDE = "+18142808822"
